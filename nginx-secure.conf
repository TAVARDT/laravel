# ----------------------------------------------------------------------
# TAVARDT Elite Laravel NGINX Security Rules
# ----------------------------------------------------------------------
# Instructions: This block assumes your Laravel application is located 
# at /var/www/html/laravel. NEVER point the web root to the main folder.

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name seu-saas.tavardt.com;

    # 1. ALWAYS point root to the /public directory.
    # This automatically hides the .env, /vendor, and /storage folders from the web.
    root /var/www/html/laravel/public;
    
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    index index.php;

    charset utf-8;

    # 2. Main Laravel Front Controller pattern
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # 3. Secure PHP execution
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock; # Update to your PHP version
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Security: Prevent execution of malicious uploaded scripts
        fastcgi_hide_header X-Powered-By;
    }

    # 4. Strictly block access to all hidden files (like .env and .git)
    # Even though root is public, this adds a second layer of defense.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}
